spring.application.name=BidPilots

# ─── Server Configuration ──────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always
server.tomcat.connection-timeout=300000
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2

# ─── Database (Aiven MySQL) ───────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://bidpilots-abhishekdandwate4597-0785.b.aivencloud.com:28189/defaultdb?useSSL=true&trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD:AVNS_G9erHFedtkXKjlaOzQ6}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Optimized for Free Tier
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# ─── Email (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:bidpilots@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:tnhzztlpmhvogfmx}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ─── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SSg64vBjzMpeU6}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:4JVS6kboD7CN9j3dc7gke0B6}

# ─── CORS Configuration (FIX FOR RAILWAY) ──────────────────────────────────────
# Add your production frontend URLs here
# For Railway: Use your actual frontend service URL
# For local development: localhost URLs are included
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://10.152.10.210:8080,https://bidpilots-production.up.railway.app,https://your-custom-domain.com}

# ─── App URLs ──────────────────────────────────────────────────────────────────
# Set this to your production backend URL on Railway
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.frontend.url=${FRONTEND_URL:https://bidpilots-production.up.railway.app}

# ─── Session & Security (Crucial for HTTPS) ────────────────────────────────────
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.secure=${COOKIE_SECURE:true}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=86400

# ─── HTTPS/SSL Configuration (For Railway) ─────────────────────────────────────
# Railway provides SSL automatically, these settings ensure cookies work properly
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# ─── Misc ──────────────────────────────────────────────────────────────────────
spring.main.allow-circular-references=true
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.in.BidPilots=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.mail=WARN

# ─── Actuator (Optional - for health checks) ───────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.mail.enabled=true

# ─── File Upload Limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Performance Tuning ────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.datasource.hikari.leak-detection-threshold=60000
