<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  BidPilots — Admin Sidebar Nav Fragment
  Place at: src/main/resources/templates/admin/adminNav.html
  Include:  <div th:replace="~{admin/adminNav :: sidebar}"></div>
-->

<body>
	<div th:fragment="sidebar">
		<style>
			/* ══ Tokens ══════════════════════════════════════════════════════ */
			:root {
				--nav-bg: #0d1117;
				--nav-border: rgba(255, 255, 255, 0.07);
				--nav-surface: rgba(255, 255, 255, 0.04);
				--nav-hover: rgba(255, 255, 255, 0.06);
				--nav-active-bg: rgba(245, 166, 35, 0.14);
				--nav-active-bd: rgba(245, 166, 35, 0.4);
				--nav-text: #94a3b8;
				--nav-hi: #f1f5f9;
				--nav-accent: #f5a623;
				--nav-grad: linear-gradient(135deg, #f5a623, #f0526a);
				--nav-success: #22c989;
				--nav-warn: #f5a623;
				--nav-danger: #f0526a;
				--nav-w: 240px;
				--nav-coll: 64px;
				--nav-t: 0.2s cubic-bezier(.4, 0, .2, 1);
			}

			/* ══ Shell ═══════════════════════════════════════════════════════ */
			.bp-nav {
				position: fixed;
				top: 0;
				left: 0;
				height: 100vh;
				height: 100dvh;
				width: var(--nav-w);
				max-width: calc(100vw - 48px);
				background: var(--nav-bg);
				border-right: 1px solid var(--nav-border);
				display: flex;
				flex-direction: column;
				z-index: 200;
				overflow: visible;
				transition: width var(--nav-t);
				box-shadow: 4px 0 32px rgba(0, 0, 0, .5);
			}

			.bp-nav.collapsed {
				width: var(--nav-coll);
			}

			/* ══ Admin Badge on Logo ══════════════════════════════════════════ */
			.bp-admin-badge {
				display: inline-flex;
				align-items: center;
				background: rgba(245, 166, 35, 0.18);
				border: 1px solid rgba(245, 166, 35, 0.35);
				color: var(--nav-accent);
				font-size: 9px;
				font-weight: 800;
				letter-spacing: .08em;
				text-transform: uppercase;
				padding: 2px 6px;
				border-radius: 5px;
				margin-left: 4px;
				white-space: nowrap;
				opacity: 1;
				transition: opacity var(--nav-t);
				flex-shrink: 0;
			}

			.bp-nav.collapsed .bp-admin-badge {
				opacity: 0;
				pointer-events: none;
			}

			/* ══ Logo ════════════════════════════════════════════════════════ */
			.bp-logo {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 20px 16px 16px;
				border-bottom: 1px solid var(--nav-border);
				text-decoration: none;
				min-height: 64px;
				flex-shrink: 0;
				overflow: hidden;
			}

			.bp-logo-mark {
				width: 32px;
				height: 32px;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
			}

			.bp-logo-mark img {
				width: 100%;
				height: 100%;
				object-fit: contain;
			}

			.bp-logo-text {
				font-family: 'Poppins', 'Inter', 'Plus Jakarta Sans', sans-serif;
				font-weight: 700;
				font-size: 18px;
				letter-spacing: -0.3px;
				color: #ffffff;
				white-space: nowrap;
				opacity: 1;
				transition: opacity var(--nav-t);
				text-decoration: none;
				background: none;
				-webkit-background-clip: unset;
				-webkit-text-fill-color: unset;
				background-clip: unset;
			}

			.bp-nav.collapsed .bp-logo-text {
				opacity: 0;
				pointer-events: none;
			}

			/* ══ Body ════════════════════════════════════════════════════════ */
			.bp-nav-body {
				flex: 1;
				padding: 10px 8px;
				overflow-y: auto;
				overflow-x: hidden;
				scrollbar-width: none;
				clip-path: none;
			}

			.bp-nav-body::-webkit-scrollbar {
				display: none;
			}

			/* ══ Section labels ══════════════════════════════════════════════ */
			.bp-sec {
				font-size: 12px;
				font-weight: 800;
				letter-spacing: .1em;
				text-transform: uppercase;
				color: rgba(148, 163, 184, .35);
				padding: 10px 10px 4px;
				white-space: nowrap;
				opacity: 1;
				transition: opacity var(--nav-t);
			}

			.bp-nav.collapsed .bp-sec {
				opacity: 0;
			}

			/* ══ Items ═══════════════════════════════════════════════════════ */
			.bp-item {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 9px 10px;
				border-radius: 10px;
				text-decoration: none;
				font-family: 'DM Sans', 'Plus Jakarta Sans', sans-serif;
				font-size: 13.5px;
				font-weight: 500;
				color: var(--nav-text);
				white-space: nowrap;
				cursor: pointer;
				border: 1px solid transparent;
				background: transparent;
				width: 100%;
				text-align: left;
				margin-bottom: 1px;
				position: relative;
				transition: background var(--nav-t), color var(--nav-t), border-color var(--nav-t);
			}

			.bp-item:hover {
				background: var(--nav-hover);
				color: var(--nav-hi);
			}

			.bp-item.active {
				background: var(--nav-active-bg);
				border-color: var(--nav-active-bd);
				color: var(--nav-accent);
				font-weight: 600;
			}

			.bp-item.active .bp-ico {
				color: var(--nav-accent);
			}

			.bp-item.danger {
				color: var(--nav-danger);
			}

			.bp-item.danger .bp-ico {
				color: var(--nav-danger);
			}

			.bp-item.danger:hover {
				background: rgba(240, 82, 106, .12);
				color: var(--nav-danger);
			}

			.bp-item.danger:hover .bp-ico {
				color: var(--nav-danger);
			}

			.bp-item-lbl {
				opacity: 1;
				transition: opacity var(--nav-t);
				overflow: hidden;
				text-overflow: ellipsis;
				flex: 1;
			}

			.bp-nav.collapsed .bp-item-lbl {
				opacity: 0;
				width: 0;
			}

			/* ══ Icons ═══════════════════════════════════════════════════════ */
			.bp-ico {
				width: 18px;
				height: 18px;
				flex-shrink: 0;
				color: rgba(148, 163, 184, .55);
				transition: color var(--nav-t);
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.bp-ico svg {
				width: 18px;
				height: 18px;
			}

			.bp-item:hover .bp-ico {
				color: var(--nav-hi);
			}

			/* ══ Badge ═══════════════════════════════════════════════════════ */
			.bp-badge {
				background: var(--nav-accent);
				color: #fff;
				font-size: 10px;
				font-weight: 700;
				border-radius: 20px;
				padding: 1px 6px;
				min-width: 18px;
				text-align: center;
				flex-shrink: 0;
				opacity: 1;
				transition: opacity var(--nav-t);
			}

			.bp-nav.collapsed .bp-badge {
				opacity: 0;
			}

			/* ══ Divider ═════════════════════════════════════════════════════ */
			.bp-div {
				height: 1px;
				background: var(--nav-border);
				margin: 6px 4px;
			}

			/* ══ Footer ══════════════════════════════════════════════════════ */
			.bp-footer {
				padding: 10px 8px;
				border-top: 1px solid var(--nav-border);
				flex-shrink: 0;
			}

			.bp-ucard {
				display: flex;
				align-items: center;
				gap: 9px;
				padding: 8px 10px;
				border-radius: 10px;
				background: var(--nav-surface);
				border: 1px solid var(--nav-border);
				overflow: hidden;
				min-width: 0;
			}

			.bp-uavatar {
				width: 30px;
				height: 30px;
				border-radius: 50%;
				background: var(--nav-grad);
				color: #fff;
				font-family: 'Syne', sans-serif;
				font-weight: 700;
				font-size: 12px;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
			}

			.bp-uinfo {
				overflow: hidden;
				opacity: 1;
				transition: opacity var(--nav-t);
				min-width: 0;
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 2px;
			}

			.bp-nav.collapsed .bp-uinfo {
				opacity: 0;
				width: 0;
			}

			/* Multi-line name styling */
			.bp-uname-multi {
				font-size: 12.5px;
				font-weight: 600;
				color: var(--nav-hi);
				font-family: 'DM Sans', sans-serif;
				line-height: 1.3;
				word-break: break-word;
				white-space: normal;
				display: flex;
				flex-direction: column;
			}

			.bp-name-first {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.bp-name-last {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				font-size: 11px;
				font-weight: 500;
				color: rgba(148, 163, 184, 0.7);
			}

			/* ══ Settings Icon Animation ══ */
			@keyframes spin {
				0% { transform: rotate(0deg); }
				100% { transform: rotate(360deg); }
			}

			.bp-item#nav-admin-settings:hover .bp-ico svg {
				animation: spin 2s linear infinite;
			}

			/* ══ Toggle btn ══════════════════════════════════════════════════ */
			.bp-toggle {
				position: absolute;
				top: 20px;
				right: -13px;
				width: 26px;
				height: 26px;
				background: #1e2a3a;
				border: 1.5px solid rgba(245, 166, 35, 0.35);
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				z-index: 201;
				transition: background var(--nav-t), border-color var(--nav-t), box-shadow var(--nav-t);
				box-shadow: 0 2px 12px rgba(0, 0, 0, .7), 0 0 0 1px rgba(245, 166, 35, 0.1);
			}

			.bp-toggle:hover {
				background: #2a3a55;
				border-color: rgba(245, 166, 35, 0.65);
				box-shadow: 0 2px 16px rgba(245, 166, 35, 0.25), 0 0 0 2px rgba(245, 166, 35, 0.15);
			}

			.bp-toggle svg {
				width: 13px;
				height: 13px;
				color: #a0b4cc;
				transition: transform var(--nav-t), color var(--nav-t);
			}

			.bp-toggle:hover svg {
				color: var(--nav-accent);
			}

			.bp-nav.collapsed .bp-toggle svg {
				transform: rotate(180deg);
			}

			/* ══ Tooltips ════════════════════════════════════════════════════ */
			.bp-nav.collapsed .bp-item[data-tip]::after {
				content: attr(data-tip);
				position: absolute;
				left: calc(var(--nav-coll) + 10px);
				top: 50%;
				transform: translateY(-50%);
				background: #1a2233;
				border: 1px solid var(--nav-border);
				color: var(--nav-hi);
				font-size: 12px;
				font-weight: 500;
				font-family: 'DM Sans', sans-serif;
				padding: 5px 10px;
				border-radius: 7px;
				white-space: nowrap;
				opacity: 0;
				pointer-events: none;
				transition: opacity .15s;
				z-index: 300;
				box-shadow: 0 4px 20px rgba(0, 0, 0, .5);
			}

			.bp-nav.collapsed .bp-item[data-tip]:hover::after {
				opacity: 1;
			}

			/* ══ Mobile ══════════════════════════════════════════════════════ */
			.bp-overlay {
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, .65);
				z-index: 199;
				backdrop-filter: blur(4px);
				-webkit-backdrop-filter: blur(4px);
				opacity: 0;
				transition: opacity var(--nav-t);
			}

			.bp-overlay.show {
				display: block;
				opacity: 1;
			}

			.bp-ham {
				display: none;
				position: fixed;
				top: 12px;
				left: 12px;
				z-index: 202;
				width: 40px;
				height: 40px;
				background: var(--nav-bg);
				border: 1px solid var(--nav-border);
				border-radius: 10px;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				box-shadow: 0 2px 16px rgba(0, 0, 0, .5);
				transition: background var(--nav-t), border-color var(--nav-t);
			}

			.bp-ham:hover {
				background: var(--nav-hover);
				border-color: rgba(245, 166, 35, 0.3);
			}

			.bp-ham svg {
				width: 18px;
				height: 18px;
				color: var(--nav-hi);
			}

			/* ══ Page offset ═════════════════════════════════════════════════ */
			.bp-page-content {
				margin-left: var(--nav-w);
				transition: margin-left var(--nav-t);
				min-height: 100vh;
				min-height: 100dvh;
				min-width: 0;
				overflow-x: hidden;
			}

			.bp-page-content.nav-collapsed {
				margin-left: var(--nav-coll);
			}

			/* ══ Tablet ══════════════════════════════════════════════════════ */
			@media(max-width:1024px) and (min-width:769px) {
				:root { --nav-w: 200px; }
			}

			/* ══ Mobile ══════════════════════════════════════════════════════ */
			@media(max-width:768px) {
				.bp-nav {
					transform: translateX(-100%);
					width: min(var(--nav-w), calc(100vw - 56px)) !important;
					max-width: 280px !important;
					transition: transform var(--nav-t);
				}

				.bp-nav.mobile-open {
					transform: translateX(0);
					box-shadow: 8px 0 48px rgba(0, 0, 0, .7);
				}

				.bp-toggle { display: none !important; }

				.bp-ham { display: flex; }

				.bp-page-content { margin-left: 0 !important; }

				.bp-item-lbl { font-size: 13px; }

				.bp-logo { padding: 16px 14px 14px; }

				.bp-nav.collapsed .bp-item[data-tip]::after { display: none; }
			}

			@media(max-width:360px) {
				.bp-nav { max-width: calc(100vw - 40px) !important; }
			}
		</style>

		<div class="bp-overlay" id="bpOverlay" onclick="bpClose()"></div>
		<button class="bp-ham" id="bpHam" onclick="bpOpen()" aria-label="Menu">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
				<line x1="3" y1="6" x2="21" y2="6" />
				<line x1="3" y1="12" x2="21" y2="12" />
				<line x1="3" y1="18" x2="21" y2="18" />
			</svg>
		</button>

		<nav class="bp-nav" id="bpNav" role="navigation">
			<button class="bp-toggle" onclick="bpToggle()" aria-label="Collapse sidebar">
				<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
					stroke-linejoin="round">
					<polyline points="15 18 9 12 15 6" />
				</svg>
			</button>

			<a href="/api/admin/dashboard" class="bp-logo">
				<div class="bp-logo-mark">
					<img src="/images/white-logo.svg" alt="BidPilots">
				</div>
				<span class="bp-logo-text">BidPilots</span>
				<span class="bp-admin-badge">Admin</span>
			</a>

			<div class="bp-nav-body">

				<!-- ══ OVERVIEW ══════════════════════════════════════════════ -->
				<div class="bp-sec">Overview</div>

				<a href="/api/admin/dashboard" class="bp-item" id="nav-admin-dashboard" data-tip="Dashboard">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="currentColor">
							<path d="M14 10V22H4a2 2 0 0 1-2-2V10z" />
							<path d="M22 10V20a2 2 0 0 1-2 2h-4V10z" />
							<path d="M22 4V8H2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z" />
						</svg></span>
					<span class="bp-item-lbl">Dashboard</span>
				</a>

				<a href="/api/admin/analytics" class="bp-item" id="nav-admin-analytics" data-tip="Analytics">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<line x1="18" y1="20" x2="18" y2="10" />
							<line x1="12" y1="20" x2="12" y2="4" />
							<line x1="6" y1="20" x2="6" y2="14" />
							<line x1="2" y1="20" x2="22" y2="20" />
						</svg></span>
					<span class="bp-item-lbl">Analytics</span>
				</a>

				<!-- ══ USER MANAGEMENT ════════════════════════════════════════ -->
				<div class="bp-div"></div>
				<div class="bp-sec">Users</div>

				<a href="/api/admin/users" class="bp-item" id="nav-admin-users" data-tip="All Users">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
							<circle cx="9" cy="7" r="4" />
							<path d="M23 21v-2a4 4 0 0 0-3-3.87" />
							<path d="M16 3.13a4 4 0 0 1 0 7.75" />
						</svg></span>
					<span class="bp-item-lbl">All Users</span>
				</a>

				<a href="/api/admin/users/new" class="bp-item" id="nav-admin-users-new" data-tip="Add User">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
							<circle cx="8.5" cy="7" r="4" />
							<line x1="20" y1="8" x2="20" y2="14" />
							<line x1="23" y1="11" x2="17" y2="11" />
						</svg></span>
					<span class="bp-item-lbl">Add User</span>
				</a>

				<a href="/api/admin/users/roles" class="bp-item" id="nav-admin-roles" data-tip="Roles">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<circle cx="12" cy="8" r="4" />
							<path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
							<polyline points="15 11 17 13 21 9" />
						</svg></span>
					<span class="bp-item-lbl">Roles</span>
				</a>

				<!-- ══ TENDERS / BIDS ═════════════════════════════════════════ -->
				<div class="bp-div"></div>
				<div class="bp-sec">Tenders</div>

				<a href="/api/admin/tenders" class="bp-item" id="nav-admin-tenders" data-tip="All Tenders">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
							<polyline points="14 2 14 8 20 8" />
							<line x1="16" y1="13" x2="8" y2="13" />
							<line x1="16" y1="17" x2="8" y2="17" />
						</svg></span>
					<span class="bp-item-lbl">All Tenders</span>
				</a>

				<a href="/api/admin/tenders/sources" class="bp-item" id="nav-admin-sources" data-tip="Data Sources">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<ellipse cx="12" cy="5" rx="9" ry="3" />
							<path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
							<path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
						</svg></span>
					<span class="bp-item-lbl">Data Sources</span>
				</a>

				<a href="/api/admin/tenders/categories" class="bp-item" id="nav-admin-categories" data-tip="Categories">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<rect x="3" y="3" width="7" height="7" />
							<rect x="14" y="3" width="7" height="7" />
							<rect x="14" y="14" width="7" height="7" />
							<rect x="3" y="14" width="7" height="7" />
						</svg></span>
					<span class="bp-item-lbl">Categories</span>
				</a>

				<!-- ══ SUBSCRIPTIONS ══════════════════════════════════════════ -->
				<div class="bp-div"></div>
				<div class="bp-sec">Subscriptions</div>

				<a href="/api/admin/subscriptions" class="bp-item" id="nav-admin-subscriptions" data-tip="Subscriptions">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<rect x="1" y="4" width="22" height="16" rx="2" ry="2" />

					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />

					<div class="bp-uinfo" id="bpAdminUInfo">
						<div id="bpAdminNameContainer" class="bp-uname-multi">
							<span class="bp-name-first" id="bpAdminFirstName">Loading...</span>
							<span class="bp-name-last" id="bpAdminLastName"></span>

		<script>
			(function () {
				var nav = document.getElementById('bpNav'), KEY = 'bp_admin_nav_v1';
				function isSmall() { return window.innerWidth <= 768; }
				function syncContent() { var c = document.querySelector('.bp-page-content'); if (c) c.classList.toggle('nav-collapsed', nav.classList.contains('collapsed')); }
				function init() { if (!isSmall() && localStorage.getItem(KEY) === '1') nav.classList.add('collapsed'); syncContent(); }
				window.bpToggle = function () { if (isSmall()) return; nav.classList.toggle('collapsed'); localStorage.setItem(KEY, nav.classList.contains('collapsed') ? '1' : '0'); syncContent(); };
				window.bpOpen = function () { nav.classList.add('mobile-open'); document.getElementById('bpOverlay').classList.add('show'); document.getElementById('bpHam').style.display = 'none'; };
				window.bpClose = function () { nav.classList.remove('mobile-open'); document.getElementById('bpOverlay').classList.remove('show'); if (isSmall()) document.getElementById('bpHam').style.display = 'flex'; };

				/* Active link detection */
				var p = window.location.pathname;
				var routes = {
					'nav-admin-dashboard':       ['/api/admin/dashboard'],
					'nav-admin-analytics':       ['/api/admin/analytics'],
					'nav-admin-users':           ['/api/admin/users'],
					'nav-admin-users-new':       ['/api/admin/users/new'],
					'nav-admin-roles':           ['/api/admin/users/roles'],
					'nav-admin-tenders':         ['/api/admin/tenders'],
					'nav-admin-sources':         ['/api/admin/tenders/sources'],
					'nav-admin-categories':      ['/api/admin/tenders/categories'],
					'nav-admin-subscriptions':   ['/api/admin/subscriptions'],
					'nav-admin-plans':           ['/api/admin/subscriptions/plans'],
					'nav-admin-payments':        ['/api/admin/payments'],
					'nav-admin-filters':         ['/api/admin/filters'],
					'nav-admin-notifications':   ['/api/admin/notifications'],
					'nav-admin-email-templates': ['/api/admin/email-templates'],
					'nav-admin-logs':            ['/api/admin/logs'],
					'nav-admin-settings':        ['/api/admin/settings']
				};
				Object.keys(routes).forEach(function (id) {
					var el = document.getElementById(id);
					if (!el) return;
					if (routes[id].some(function (r) { return p === r || p.startsWith(r); })) el.classList.add('active');
				});
				init();

				/* Admin user info */
				function splitAndDisplayName(fullName) {
					var firstNameSpan = document.getElementById('bpAdminFirstName');
					var lastNameSpan = document.getElementById('bpAdminLastName');
					if (!fullName || fullName === '—' || fullName === 'Loading...') {
						firstNameSpan.textContent = 'Admin';
						lastNameSpan.textContent = '';
						return;
					}
					var nameParts = fullName.trim().split(/\s+/);
					if (nameParts.length === 1) {
						firstNameSpan.textContent = nameParts[0];
						lastNameSpan.textContent = '';
					} else {
						firstNameSpan.textContent = nameParts[0];
						lastNameSpan.textContent = nameParts.slice(1).join(' ');
					}
				}

				fetch('/api/users/current-user', { credentials: 'include' }).then(function (r) { return r.json(); }).then(function (d) {
					var u = d.success && d.user ? d.user : null; if (!u) return;
					var name = u.companyName || u.name || u.email || '—';
					var firstNameSpan = document.getElementById('bpAdminFirstName');
					var lastNameSpan = document.getElementById('bpAdminLastName');

					if ((!u.companyName && !u.name) && u.email && u.email !== '—') {
						var emailParts = u.email.split('@');
						firstNameSpan.textContent = emailParts[0] || 'Admin';
						lastNameSpan.textContent = emailParts[1] || '';
					} else {
						splitAndDisplayName(name);
					}

					// Avatar initials
					var nameForIni = (u.companyName || u.name || u.email || 'AD').trim();
					var ini = '';
					if (nameForIni.includes(' ')) {
						var parts = nameForIni.split(/\s+/);
						ini = ((parts[0][0] || '') + (parts[1][0] || '')).toUpperCase();
					} else {
						ini = nameForIni.substring(0, 2).toUpperCase();
					}
					if (!ini) ini = (u.email && u.email[0]) ? u.email[0].toUpperCase() : 'AD';
					document.getElementById('bpAdminAvatar').textContent = ini;

					var nameContainer = document.getElementById('bpAdminNameContainer');
					if (nameContainer) nameContainer.setAttribute('title', name);
				}).catch(function () {
					document.getElementById('bpAdminFirstName').textContent = 'Admin';
					document.getElementById('bpAdminLastName').textContent = '';
				});

				window.bpAdminLogout = function () {
					fetch('/api/users/logout', { method: 'POST', credentials: 'include' }).finally(function () {
						window.location.href = '/api/users/login-form';
					});
				};

				/* Click outside to collapse (desktop) */
				document.addEventListener('click', function (e) {
					if (isSmall()) return;
					if (nav.classList.contains('collapsed')) return;
					if (nav.contains(e.target)) return;
					nav.classList.add('collapsed');
					localStorage.setItem(KEY, '1');
					syncContent();
				}, true);

				/* Logo SVG fallback */
				var logoImg = document.querySelector('.bp-logo-mark img');
				if (logoImg) {
					logoImg.style.filter = 'none';
					logoImg.style.background = 'none';
					logoImg.onerror = function () {
						this.alt = 'BP';
						this.style.display = 'none';
						var fallbackSpan = document.createElement('span');
						fallbackSpan.textContent = 'BP';
						fallbackSpan.style.fontWeight = '800';
						fallbackSpan.style.fontSize = '13px';
						fallbackSpan.style.color = '#fff';
						this.parentElement.appendChild(fallbackSpan);
					};
				}

				var styleForCollapse = document.createElement('style');
				styleForCollapse.textContent = '.bp-nav.collapsed .bp-uname-multi { opacity: 0; visibility: hidden; } .bp-uname-multi { transition: opacity var(--nav-t); }';
				document.head.appendChild(styleForCollapse);
			})();
		</script>
	</div>
</body>
