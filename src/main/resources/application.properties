spring.application.name=BidPilots

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0
server.error.include-message=always

# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Gmail SMTP ────────────────────────────────────────────────────────────────
# Set GMAIL_USERNAME and GMAIL_APP_PASSWORD as environment variables in Railway
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ─── App ───────────────────────────────────────────────────────────────────────
app.base.url=${APP_BASE_URL:https://bidpilots-production.up.railway.app}
app.cors.allowed-origins=${CORS_ORIGINS:https://bidpilots-production.up.railway.app,http://localhost:8080}

# ─── Subscription ──────────────────────────────────────────────────────────────
subscription.allow-early-renewal=true
subscription.extension-notification-days=7

# ─── GeM Portal ────────────────────────────────────────────────────────────────
gem.portal.base.url=https://bidplus.gem.gov.in
gem.verification.timeout=30
gem.verification.retries=2

# ─── Scheduling and Async ──────────────────────────────────────────────────────
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# ─── Scraping ──────────────────────────────────────────────────────────────────
scraping.proxy.enabled=false
scraping.residential.proxy=false
scraping.window.start=09:00
scraping.window.end=01:00

# ─── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.in.BidPilots=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# ─── Misc ──────────────────────────────────────────────────────────────────────
spring.main.allow-circular-references=true
spring.jpa.open-in-view=false
