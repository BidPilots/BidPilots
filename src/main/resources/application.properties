spring.application.name=BidPilots

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0
server.error.include-message=always
server.tomcat.connection-timeout=300000
server.servlet.session.timeout=86400
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.max-age=86400
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
server.servlet.session.tracking-modes=cookie

# ─── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bidpilots_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# ─── Email ─────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bidpilots@gmail.com
spring.mail.password=tnhzztlpmhvogfmx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key.id=rzp_test_SgamJkWYmtTZpS
razorpay.key.secret=XediYtWB6AwXHm1tCkgbcQw1

# ─── App ───────────────────────────────────────────────────────────────────────
app.base.url=${APP_BASE_URL:http://10.152.10.210:8080}

app.cors.allowed-origins=http://localhost:8080,http://10.152.10.210:8080

# ─── Subscription Configuration ────────────────────────────────────────────────
subscription.allow-early-renewal=true
subscription.extension-notification-days=7

# ─── GeM Portal ────────────────────────────────────────────────────────────────
gem.portal.base.url=https://bidplus.gem.gov.in
gem.verification.timeout=30
gem.verification.retries=2

# ─── Scheduling and Async ──────────────────────────────────────────────────────
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-task-

# ─── Scraping ──────────────────────────────────────────────────────────────────
scraping.proxy.enabled=false
scraping.proxy.list=
scraping.residential.proxy=false
scraping.window.start=09:00
scraping.window.end=01:00

# ─── Thymeleaf ─────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.in.BidPilots=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.scheduling=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.apache.pdfbox=ERROR
logging.level.org.apache.fontbox=ERROR
logging.level.org.openqa.selenium.devtools.CdpVersionFinder=WARN
logging.level.in.BidPilots.service.BidAutoCloseService=INFO
logging.level.in.BidPilots.service.UserBidMatchingService=DEBUG

# ─── Misc ──────────────────────────────────────────────────────────────────────
spring.main.allow-circular-references=true