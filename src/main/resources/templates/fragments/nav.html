<style>
/* ============================================
   SIDEBAR STYLES - PREMIUM DESIGN
   ============================================ */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 280px;
  background: linear-gradient(180deg, rgba(10, 14, 26, 0.98) 0%, rgba(7, 10, 22, 0.98) 100%);
  backdrop-filter: blur(20px);
  border-right: 1px solid rgba(79, 142, 247, 0.15);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(79, 142, 247, 0.3); border-radius: 4px; }

.sb-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(79, 142, 247, 0.15);
  text-decoration: none;
  margin-bottom: 8px;
}

.sb-logo {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, #4f8ef7 0%, #7c5cfc 50%, #a855f7 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s;
  box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3);
}

.sb-brand:hover .sb-logo { transform: scale(1.05); }

.sb-name {
  font-size: 18px;
  font-weight: 800;
  background: linear-gradient(135deg, #4f8ef7 0%, #7c5cfc 50%, #a855f7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.3px;
}

.sb-badge-brand {
  margin-left: auto;
  background: rgba(34, 201, 137, 0.15);
  border: 1px solid rgba(34, 201, 137, 0.3);
  color: #22c989;
  font-size: 8px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 20px;
}

.sb-sec {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #4e6080;
  padding: 20px 20px 8px;
}

.sb-nav {
  list-style: none;
  padding: 4px 12px;
  flex: 1;
}

.sb-nav li { margin-bottom: 4px; }

.sb-nav a {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 12px;
  color: #94a3b8;
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s ease;
}

.sb-nav a:hover {
  background: rgba(79, 142, 247, 0.12);
  color: #f1f5f9;
  transform: translateX(3px);
}

.sb-nav a.active {
  background: linear-gradient(135deg, rgba(79, 142, 247, 0.2) 0%, rgba(124, 92, 252, 0.15) 100%);
  color: #7daaff;
  font-weight: 600;
  border-left: 2px solid #4f8ef7;
}

.ni {
  width: 18px;
  height: 18px;
  opacity: 0.7;
}

.sb-nav a:hover .ni,
.sb-nav a.active .ni { opacity: 1; }

.sb-badge {
  margin-left: auto;
  background: linear-gradient(135deg, #4f8ef7 0%, #7c5cfc 50%, #a855f7 100%);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 20px;
}

.sb-footer {
  padding: 16px 12px 20px;
  border-top: 1px solid rgba(79, 142, 247, 0.15);
  margin-top: auto;
}

.sb-user {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 12px;
  transition: background 0.2s;
  background: rgba(255, 255, 255, 0.03);
}

.sb-user:hover { background: rgba(255, 255, 255, 0.06); }

.u-av {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4f8ef7 0%, #7c5cfc 50%, #a855f7 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}

.u-name {
  font-size: 12px;
  font-weight: 600;
  color: #f1f5f9;
}

.u-role {
  font-size: 10px;
  color: #4e6080;
}

.logout-btn {
  margin-left: auto;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  color: #4e6080;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logout-btn:hover {
  color: #f0526a;
  background: rgba(240, 82, 106, 0.1);
}

.mob-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  z-index: 89;
}

.mob-overlay.open { display: block; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-280px); width: 280px; }
  .sidebar.open { transform: none; }
  .mob-overlay.open { display: block; }
}
</style>

<script>
// Nav Functions - to be exposed globally
window.navFunctions = {
  setActiveLink: function(pageId) {
    const map = {
      dashboard: 'nav-dashboard',
      bids: 'nav-bids',
      filters: 'nav-filters',
      analytics: 'nav-analytics',
      subscription: 'nav-subscription',
      profile: 'nav-profile',
      settings: 'nav-settings'
    };
    const activeId = map[pageId];
    document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
    if (activeId) {
      const activeLink = document.getElementById(activeId);
      if (activeLink) activeLink.classList.add('active');
    }
  },
  
  loadUser: async function() {
    try {
      const res = await fetch('/api/user/current', { credentials: 'include' });
      if (res.status === 401) {
        window.location.href = '/api/users/login-form';
        return null;
      }
      const data = await res.json();
      if (data?.success) {
        const user = data.user || data;
        const name = user.companyName || user.email || 'User';
        const av = document.getElementById('navUserAv');
        const nm = document.getElementById('navUserName');
        const pl = document.getElementById('navUserPlan');
        if (av) av.textContent = name.charAt(0).toUpperCase();
        if (nm) nm.textContent = name;
        if (pl && user.planName) pl.textContent = user.planName;
        return user;
      }
    } catch(e) { console.error('Nav load error:', e); }
    return null;
  },
  
  loadBadges: async function() {
    try {
      const [unreadRes, filtersRes] = await Promise.all([
        fetch('/api/user/matches/unviewed/count', { credentials: 'include' }),
        fetch('/api/user/filters/my', { credentials: 'include' })
      ]);
      if (unreadRes.ok) {
        const data = await unreadRes.json();
        if (data?.success) {
          const count = data.count || 0;
          const badge = document.getElementById('navUnreadBadge');
          if (badge) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.style.display = count > 0 ? '' : 'none';
          }
        }
      }
      if (filtersRes.ok) {
        const data = await filtersRes.json();
        if (data?.success) {
          const count = data.filters?.length || data.total || 0;
          const badge = document.getElementById('navFilterCount');
          if (badge) {
            badge.textContent = count;
            badge.style.display = count > 0 ? '' : 'none';
          }
        }
      }
    } catch(e) { console.error('Badge load error:', e); }
  }
};

// Global functions for mobile and logout
window.openSb = function() {
  document.getElementById('sidebar')?.classList.add('open');
  document.getElementById('mobOverlay')?.classList.add('open');
};

window.closeSb = function() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('mobOverlay')?.classList.remove('open');
};

window.logout = async function() {
  try {
    await fetch('/api/users/logout', { method: 'POST', credentials: 'include' });
  } catch(e) {}
  window.location.href = '/api/users/login-form';
};

// Initialize nav when loaded
document.addEventListener('DOMContentLoaded', () => {
  window.navFunctions.loadUser();
  window.navFunctions.loadBadges();
});
</script>
