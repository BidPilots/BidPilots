<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  BidPilots — Sidebar Nav Fragment
  Place at: src/main/resources/templates/fragments/nav.html
  Include:  <div th:replace="~{fragments/nav :: sidebar}"></div>
-->

<body>
	<div th:fragment="sidebar">
		<style>
			/* ══ Tokens ══════════════════════════════════════════════════════ */
			:root {
				--nav-bg: #0d1117;
				--nav-border: rgba(255, 255, 255, 0.07);
				--nav-surface: rgba(255, 255, 255, 0.04);
				--nav-hover: rgba(255, 255, 255, 0.06);
				--nav-active-bg: rgba(79, 142, 247, 0.14);
				--nav-active-bd: rgba(79, 142, 247, 0.4);
				--nav-text: #94a3b8;
				--nav-hi: #f1f5f9;
				--nav-accent: #4f8ef7;
				--nav-grad: linear-gradient(135deg, #4f8ef7, #7c5cfc);
				--nav-success: #22c989;
				--nav-warn: #f5a623;
				--nav-danger: #f0526a;
				--nav-w: 240px;
				--nav-coll: 64px;
				--nav-t: 0.2s cubic-bezier(.4, 0, .2, 1);
			}

			/* ══ Shell ═══════════════════════════════════════════════════════ */
			.bp-nav {
				position: fixed;
				top: 0;
				left: 0;
				height: 100vh;
				height: 100dvh;
				width: var(--nav-w);
				max-width: calc(100vw - 48px);
				background: var(--nav-bg);
				border-right: 1px solid var(--nav-border);
				display: flex;
				flex-direction: column;
				z-index: 200;
				overflow: visible;
				transition: width var(--nav-t);
				box-shadow: 4px 0 32px rgba(0, 0, 0, .5);
			}

			.bp-nav.collapsed {
				width: var(--nav-coll);
			}

			/* ══ Logo ════════════════════════════════════════════════════════ */
			.bp-logo {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 20px 16px 16px;
				border-bottom: 1px solid var(--nav-border);
				text-decoration: none;
				min-height: 64px;
				flex-shrink: 0;
				overflow: hidden;
			}

			.bp-logo-mark {
				width: 32px;
				height: 32px;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
			}

			.bp-logo-mark img {
				width: 100%;
				height: 100%;
				object-fit: contain;
			}

			.bp-logo-text {
				font-family: 'Poppins', 'Inter', 'Plus Jakarta Sans', sans-serif;
				font-weight: 700;
				font-size: 18px;
				letter-spacing: -0.3px;
				color: #ffffff;
				white-space: nowrap;
				opacity: 1;
				transition: opacity var(--nav-t);
				text-decoration: none;
				background: none;
				-webkit-background-clip: unset;
				-webkit-text-fill-color: unset;
				background-clip: unset;
			}

			.bp-nav.collapsed .bp-logo-text {
				opacity: 0;
				pointer-events: none;
			}

			/* ══ Body ════════════════════════════════════════════════════════ */
			.bp-nav-body {
				flex: 1;
				padding: 10px 8px;
				overflow-y: auto;
				overflow-x: hidden;
				scrollbar-width: none;
				clip-path: none;
			}

			.bp-nav-body::-webkit-scrollbar {
				display: none;
			}

			/* ══ Section labels ══════════════════════════════════════════════ */
			.bp-sec {
				font-size: 12px;
				font-weight: 800;
				letter-spacing: .1em;
				text-transform: uppercase;
				color: rgba(148, 163, 184, .35);
				padding: 10px 10px 4px;
				white-space: nowrap;
				opacity: 1;
				transition: opacity var(--nav-t);
			}

			.bp-nav.collapsed .bp-sec {
				opacity: 0;
			}

			/* ══ Items ═══════════════════════════════════════════════════════ */
			.bp-item {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 9px 10px;
				border-radius: 10px;
				text-decoration: none;
				font-family: 'DM Sans', 'Plus Jakarta Sans', sans-serif;
				font-size: 13.5px;
				font-weight: 500;
				color: var(--nav-text);
				white-space: nowrap;
				cursor: pointer;
				border: 1px solid transparent;
				background: transparent;
				width: 100%;
				text-align: left;
				margin-bottom: 1px;
				position: relative;
				transition: background var(--nav-t), color var(--nav-t), border-color var(--nav-t);
			}

			.bp-item:hover {
				background: var(--nav-hover);
				color: var(--nav-hi);
			}

			.bp-item.active {
				background: var(--nav-active-bg);
				border-color: var(--nav-active-bd);
				color: var(--nav-accent);
				font-weight: 600;
			}

			.bp-item.active .bp-ico {
				color: var(--nav-accent);
			}

			.bp-item.danger {
				color: var(--nav-danger);
			}

			.bp-item.danger .bp-ico {
				color: var(--nav-danger);
			}

			.bp-item.danger:hover {
				background: rgba(240, 82, 106, .12);
				color: var(--nav-danger);
			}

			.bp-item.danger:hover .bp-ico {
				color: var(--nav-danger);
			}

			.bp-item-lbl {
				opacity: 1;
				transition: opacity var(--nav-t);
				overflow: hidden;
				text-overflow: ellipsis;
				flex: 1;
			}

			.bp-nav.collapsed .bp-item-lbl {
				opacity: 0;
				width: 0;
			}

			/* ══ Icons ═══════════════════════════════════════════════════════ */
			.bp-ico {
				width: 18px;
				height: 18px;
				flex-shrink: 0;
				color: rgba(148, 163, 184, .55);
				transition: color var(--nav-t);
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.bp-ico svg {
				width: 18px;
				height: 18px;
			}

			.bp-item:hover .bp-ico {
				color: var(--nav-hi);
			}

			/* ══ Badge ═══════════════════════════════════════════════════════ */
			.bp-badge {
				background: var(--nav-accent);
				color: #fff;
				font-size: 10px;
				font-weight: 700;
				border-radius: 20px;
				padding: 1px 6px;
				min-width: 18px;
				text-align: center;
				flex-shrink: 0;
				opacity: 1;
				transition: opacity var(--nav-t);
			}

			.bp-nav.collapsed .bp-badge {
				opacity: 0;
			}

			/* ══ Divider ═════════════════════════════════════════════════════ */
			.bp-div {
				height: 1px;
				background: var(--nav-border);
				margin: 6px 4px;
			}

			/* ══ Footer ══════════════════════════════════════════════════════ */
			.bp-footer {
				padding: 10px 8px;
				border-top: 1px solid var(--nav-border);
				flex-shrink: 0;
			}

			.bp-ucard {
				display: flex;
				align-items: center;
				gap: 9px;
				padding: 8px 10px;
				border-radius: 10px;
				background: var(--nav-surface);
				border: 1px solid var(--nav-border);
				overflow: hidden;
				min-width: 0;
			}

			.bp-uavatar {
				width: 30px;
				height: 30px;
				border-radius: 50%;
				background: var(--nav-grad);
				color: #fff;
				font-family: 'Syne', sans-serif;
				font-weight: 700;
				font-size: 12px;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
			}

			.bp-uinfo {
				overflow: hidden;
				opacity: 1;
				transition: opacity var(--nav-t);
				min-width: 0;
				flex: 1;
				display: flex;
				flex-direction: column;
				gap: 2px;
			}

			.bp-nav.collapsed .bp-uinfo {
				opacity: 0;
				width: 0;
			}

			/* Multi-line name styling */
			.bp-uname-multi {
				font-size: 12.5px;
				font-weight: 600;
				color: var(--nav-hi);
				font-family: 'DM Sans', sans-serif;
				line-height: 1.3;
				word-break: break-word;
				white-space: normal;
				display: flex;
				flex-direction: column;
			}

			.bp-name-first {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.bp-name-last {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
				font-size: 11px;
				font-weight: 500;
				color: rgba(148, 163, 184, 0.7);
			}

			/* ══ Settings Icon Animation ══ */
			@keyframes spin {
				0% {
					transform: rotate(0deg);
				}

				100% {
					transform: rotate(360deg);
				}
			}

			.bp-item#nav-settings:hover .bp-ico svg {
				animation: spin 2s linear infinite;
			}

			/* ══ Toggle btn ══════════════════════════════════════════════════ */
			.bp-toggle {
				position: absolute;
				top: 20px;
				right: -13px;
				width: 26px;
				height: 26px;
				background: #1e2a3a;
				border: 1.5px solid rgba(79, 142, 247, 0.35);
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				z-index: 201;
				transition: background var(--nav-t), border-color var(--nav-t), box-shadow var(--nav-t);
				box-shadow: 0 2px 12px rgba(0, 0, 0, .7), 0 0 0 1px rgba(79, 142, 247, 0.1);
			}

			.bp-toggle:hover {
				background: #2a3a55;
				border-color: rgba(79, 142, 247, 0.65);
				box-shadow: 0 2px 16px rgba(79, 142, 247, 0.25), 0 0 0 2px rgba(79, 142, 247, 0.15);
			}

			.bp-toggle svg {
				width: 13px;
				height: 13px;
				color: #a0b4cc;
				transition: transform var(--nav-t), color var(--nav-t);
			}

			.bp-toggle:hover svg {
				color: #4f8ef7;
			}

			.bp-nav.collapsed .bp-toggle svg {
				transform: rotate(180deg);
			}

			/* ══ Tooltips ════════════════════════════════════════════════════ */
			.bp-nav.collapsed .bp-item[data-tip]::after {
				content: attr(data-tip);
				position: absolute;
				left: calc(var(--nav-coll) + 10px);
				top: 50%;
				transform: translateY(-50%);
				background: #1a2233;
				border: 1px solid var(--nav-border);
				color: var(--nav-hi);
				font-size: 12px;
				font-weight: 500;
				font-family: 'DM Sans', sans-serif;
				padding: 5px 10px;
				border-radius: 7px;
				white-space: nowrap;
				opacity: 0;
				pointer-events: none;
				transition: opacity .15s;
				z-index: 300;
				box-shadow: 0 4px 20px rgba(0, 0, 0, .5);
			}

			.bp-nav.collapsed .bp-item[data-tip]:hover::after {
				opacity: 1;
			}

			/* ══ Mobile ══════════════════════════════════════════════════════ */
			.bp-overlay {
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, .65);
				z-index: 199;
				backdrop-filter: blur(4px);
				-webkit-backdrop-filter: blur(4px);
				opacity: 0;
				transition: opacity var(--nav-t);
			}

			.bp-overlay.show {
				display: block;
				opacity: 1;
			}

			.bp-ham {
				display: none;
				position: fixed;
				top: 12px;
				left: 12px;
				z-index: 202;
				width: 40px;
				height: 40px;
				background: var(--nav-bg);
				border: 1px solid var(--nav-border);
				border-radius: 10px;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				box-shadow: 0 2px 16px rgba(0, 0, 0, .5);
				transition: background var(--nav-t), border-color var(--nav-t);
			}

			.bp-ham:hover {
				background: var(--nav-hover);
				border-color: rgba(79, 142, 247, 0.3);
			}

			.bp-ham svg {
				width: 18px;
				height: 18px;
				color: var(--nav-hi);
			}

			/* ══ Page offset ═════════════════════════════════════════════════ */
			.bp-page-content {
				margin-left: var(--nav-w);
				transition: margin-left var(--nav-t);
				min-height: 100vh;
				min-height: 100dvh;
				min-width: 0;
				overflow-x: hidden;
			}

			.bp-page-content.nav-collapsed {
				margin-left: var(--nav-coll);
			}

			/* ══ Tablet ══════════════════════════════════════════════════════ */
			@media(max-width:1024px) and (min-width:769px) {
				:root {
					--nav-w: 200px;
				}
			}

			/* ══ Mobile ══════════════════════════════════════════════════════ */
			@media(max-width:768px) {
				.bp-nav {
					transform: translateX(-100%);
					width: min(var(--nav-w), calc(100vw - 56px)) !important;
					max-width: 280px !important;
					transition: transform var(--nav-t);
				}

				.bp-nav.mobile-open {
					transform: translateX(0);
					box-shadow: 8px 0 48px rgba(0, 0, 0, .7);
				}

				.bp-toggle {
					display: none !important;
				}

				.bp-ham {
					display: flex;
				}

				.bp-page-content {
					margin-left: 0 !important;
				}

				.bp-item-lbl {
					font-size: 13px;
				}

				.bp-logo {
					padding: 16px 14px 14px;
				}

				.bp-nav.collapsed .bp-item[data-tip]::after {
					display: none;
				}
			}

			@media(max-width:360px) {
				.bp-nav {
					max-width: calc(100vw - 40px) !important;
				}
			}
		</style>

		<div class="bp-overlay" id="bpOverlay" onclick="bpClose()"></div>
		<button class="bp-ham" id="bpHam" onclick="bpOpen()" aria-label="Menu">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
				<line x1="3" y1="6" x2="21" y2="6" />
				<line x1="3" y1="12" x2="21" y2="12" />
				<line x1="3" y1="18" x2="21" y2="18" />
			</svg>
		</button>

		<nav class="bp-nav" id="bpNav" role="navigation">
			<button class="bp-toggle" onclick="bpToggle()" aria-label="Collapse sidebar">
				<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
					stroke-linejoin="round">
					<polyline points="15 18 9 12 15 6" />

			</button>

			<a href="/api/user/dashboard" class="bp-logo">
				<div class="bp-logo-mark">
					<img src="/images/white-logo.svg" alt="BidPilots">
				</div>
				<span class="bp-logo-text">BidPilots</span>
			</a>

			<div class="bp-nav-body">
				<div class="bp-sec">Main</div>
				<a href="/api/user/dashboard" class="bp-item" id="nav-dashboard" data-tip="Dashboard">

				</a>
				<a href="/api/user/tenders" class="bp-item" id="nav-bids" data-tip="My Bids">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

							<polyline points="14 2 14 8 20 8" />
							<line x1="16" y1="13" x2="8" y2="13" />
							<line x1="16" y1="17" x2="8" y2="17" />

					<span class="bp-item-lbl">My Bids</span>
				</a>
				<a href="/api/user/filters-page" class="bp-item" id="nav-filters" data-tip="Filters">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />

					<span class="bp-item-lbl">Filters</span>
				</a>
				<a href="/api/user/all-filters" class="bp-item" id="nav-all-filters" data-tip="All Filters">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<line x1="8" y1="6" x2="21" y2="6" />
							<line x1="8" y1="12" x2="21" y2="12" />
							<line x1="8" y1="18" x2="21" y2="18" />
							<line x1="3" y1="6" x2="3.01" y2="6" />
							<line x1="3" y1="12" x2="3.01" y2="12" />
							<line x1="3" y1="18" x2="3.01" y2="18" />
						</svg></span>
					<span class="bp-item-lbl">All Filters</span>
				</a>

				<div class="bp-div"></div>
				<div class="bp-sec">Account</div>

				<a href="/subscription/plans" class="bp-item" id="nav-subscription" data-tip="Subscription">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"

							<rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
							<line x1="1" y1="10" x2="23" y2="10" />
						</svg></span>
					<span class="bp-item-lbl">Subscription</span>
				</a>

				<!-- UPDATED: Profile link with correct href -->
				<a href="/api/user/profile" class="bp-item" id="nav-profile" data-tip="Profile">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />

					<span class="bp-item-lbl">Profile</span>

				<!--						</svg></span>-->
				<!--					<span class="bp-item-lbl">Settings</span>-->
				<!--				</a>-->

				<div class="bp-div"></div>
				<button class="bp-item danger" data-tip="Logout" onclick="bpLogout()">
					<span class="bp-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
							stroke-linecap="round" stroke-linejoin="round">
							<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
							<polyline points="16 17 21 12 16 7" />

			</div>

			<div class="bp-footer">
				<div class="bp-ucard">

						<div id="bpNameContainer" class="bp-uname-multi">
							<span class="bp-name-first" id="bpFirstName">Loading...</span>
							<span class="bp-name-last" id="bpLastName"></span>
						</div>
					</div>
				</div>
			</div>
		</nav>

		<script>
			(function () {
				var nav = document.getElementById('bpNav'), KEY = 'bp_nav_v3';
				function isSmall() {return window.innerWidth <= 768;}
				function syncContent() {var c = document.querySelector('.bp-page-content'); if (c) c.classList.toggle('nav-collapsed', nav.classList.contains('collapsed'));}
				function init() {if (!isSmall() && localStorage.getItem(KEY) === '1') nav.classList.add('collapsed'); syncContent();}
				window.bpToggle = function () {if (isSmall()) return; nav.classList.toggle('collapsed'); localStorage.setItem(KEY, nav.classList.contains('collapsed') ? '1' : '0'); syncContent();};
				window.bpOpen = function () {nav.classList.add('mobile-open'); document.getElementById('bpOverlay').classList.add('show'); document.getElementById('bpHam').style.display = 'none';};
				window.bpClose = function () {nav.classList.remove('mobile-open'); document.getElementById('bpOverlay').classList.remove('show'); if (isSmall()) document.getElementById('bpHam').style.display = 'flex';};

				/* Active link detection */
				var p = window.location.pathname;
				var routes = {
					'nav-dashboard': ['/api/user/dashboard', '/api/user/my-dashboard'],
					'nav-bids': ['/api/user/tenders'],
					'nav-filters': ['/api/user/filters-page'],
					'nav-all-filters': ['/api/user/all-filters'],
					'nav-subscription': ['/subscription/plans'],
					'nav-profile': ['/api/user/profile'],
					'nav-settings': ['/api/user/settings']
				};
				Object.keys(routes).forEach(function (id) {var el = document.getElementById(id); if (!el) return; if (routes[id].some(function (r) {return p === r || p.startsWith(r);})) el.classList.add('active');});
				init();

				/* User info with split name */
				function splitAndDisplayName(fullName) {
					var firstNameSpan = document.getElementById('bpFirstName');
					var lastNameSpan = document.getElementById('bpLastName');

					if (!fullName || fullName === '—' || fullName === 'Loading...') {
						firstNameSpan.textContent = 'User';
						lastNameSpan.textContent = '';
						return;
					}

					var nameParts = fullName.trim().split(/\s+/);
					if (nameParts.length === 1) {
						firstNameSpan.textContent = nameParts[0];
						lastNameSpan.textContent = '';
					} else {
						var firstName = nameParts[0];
						var lastName = nameParts.slice(1).join(' ');
						firstNameSpan.textContent = firstName;
						lastNameSpan.textContent = lastName;
					}
				}

				fetch('/api/users/current-user', {credentials: 'include'}).then(function (r) {return r.json();}).then(function (d) {
					var u = d.success && d.user ? d.user : null; if (!u) return;
					var name = u.companyName || u.name || u.email || '—';
					var firstNameSpan = document.getElementById('bpFirstName');
					var lastNameSpan = document.getElementById('bpLastName');

					if ((!u.companyName && !u.name) && u.email && u.email !== '—') {
						var emailParts = u.email.split('@');
						var emailUser = emailParts[0] || 'User';
						var emailDomain = emailParts[1] || '';
						firstNameSpan.textContent = emailUser;
						lastNameSpan.textContent = emailDomain;
					} else {
						splitAndDisplayName(name);
					}

					// Avatar initials
					var ini = '';
					var nameForIni = u.companyName || u.name || u.email || 'BP';
					var nameTrim = nameForIni.trim();
					if (nameTrim.includes(' ')) {
						var parts = nameTrim.split(/\s+/);
						ini = (parts[0][0] || '') + (parts[1][0] || '');
						ini = ini.toUpperCase();
					} else {
						ini = nameTrim.substring(0, 2).toUpperCase();
					}
					if (ini.length === 0) ini = (u.email && u.email[0]) ? u.email[0].toUpperCase() : 'BP';
					document.getElementById('bpAvatar').textContent = ini;

					var nameContainer = document.getElementById('bpNameContainer');
					if (nameContainer) nameContainer.setAttribute('title', name);
				}).catch(function () {
					document.getElementById('bpFirstName').textContent = 'User';
					document.getElementById('bpLastName').textContent = '';
				});

				window.bpLogout = function () {fetch('/api/users/logout', {method: 'POST', credentials: 'include'}).finally(function () {window.location.href = '/api/users/login-form';});};

				/* Click outside to collapse (desktop) */
				document.addEventListener('click', function (e) {
					if (isSmall()) return;
					if (nav.classList.contains('collapsed')) return;
					if (nav.contains(e.target)) return;
					nav.classList.add('collapsed');
					localStorage.setItem(KEY, '1');
					syncContent();
				}, true);

				/* Logo SVG fallback */
				var logoImg = document.querySelector('.bp-logo-mark img');
				if (logoImg) {
					logoImg.style.filter = 'none';
					logoImg.style.background = 'none';
					logoImg.onerror = function () {
						this.alt = 'BP';
						this.style.display = 'none';
						var fallbackSpan = document.createElement('span');
						fallbackSpan.textContent = 'BP';
						fallbackSpan.style.fontWeight = '800';
						fallbackSpan.style.fontSize = '13px';
						fallbackSpan.style.color = '#fff';
						this.parentElement.appendChild(fallbackSpan);
					};
				}

				var styleForCollapse = document.createElement('style');
				styleForCollapse.textContent = '.bp-nav.collapsed .bp-uname-multi { opacity: 0; visibility: hidden; } .bp-uname-multi { transition: opacity var(--nav-t); }';
				document.head.appendChild(styleForCollapse);
			})();
		</script>
	</div>
</body>

</html>
